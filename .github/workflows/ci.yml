name: CI

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Inject BACKEND_URL
        shell: bash
        env:
          BACKEND_URL_PRODUCTION: ${{ secrets.BACKEND_URL_PRODUCTION }}
          BACKEND_URL_STAGING: ${{ secrets.BACKEND_URL_STAGING }}
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            if [ -z "$BACKEND_URL_PRODUCTION" ]; then
              echo "::error::Missing secret BACKEND_URL_PRODUCTION"
              echo "::error::Set it in Settings -> Secrets and variables -> Actions -> Repository secrets"
              exit 1
            fi
            echo "BACKEND_URL=$BACKEND_URL_PRODUCTION" >> "$GITHUB_ENV"
          else
            if [ -z "$BACKEND_URL_STAGING" ]; then
              echo "::error::Missing secret BACKEND_URL_STAGING"
              echo "::error::Set it in Settings -> Secrets and variables -> Actions -> Repository secrets"
              exit 1
            fi
            echo "BACKEND_URL=$BACKEND_URL_STAGING" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build