name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - release
      - 'release/**'
  push:
    branches:
      - main
      - master
      - develop
      - release
      - 'release/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve target branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "target_branch=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "target_branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject BACKEND_URL
        env:
          TARGET_BRANCH: ${{ steps.branch.outputs.target_branch }}
          BACKEND_URL_PRODUCTION: ${{ secrets.BACKEND_URL_PRODUCTION }}
          BACKEND_URL_STAGING: ${{ secrets.BACKEND_URL_STAGING }}
        run: |
          if [ "$TARGET_BRANCH" = "main" ] || [ "$TARGET_BRANCH" = "master" ]; then
            selected_url="$BACKEND_URL_PRODUCTION"
            selected_env="production"
            selected_key="BACKEND_URL_PRODUCTION"
          else
            selected_url="$BACKEND_URL_STAGING"
            selected_env="staging"
            selected_key="BACKEND_URL_STAGING"
          fi

          if [ -z "$selected_url" ]; then
            echo "::error::Missing required secret '$selected_key' for branch '$TARGET_BRANCH' (resolved env: $selected_env)." >&2
            echo "::error::Set this at Settings -> Secrets and variables -> Actions -> Repository secrets." >&2
            exit 1
          fi

          echo "BACKEND_URL=$selected_url" >> "$GITHUB_ENV"
          echo "Using $selected_env backend URL for branch $TARGET_BRANCH"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
